<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>移动端适配</title>
    <style>
        .box1 {
            width: 300px;
            height: 100px;
            background-color:blueviolet;
    
        }
        .box2  {
            margin-top:20px;
            width:5rem;
            height:3rem;
            background-color:blue;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <script>
        function reset(){
            document.documentElement.style.fontSize = screen.width / 10 + 'px';
        }
        window.onresize = reset;
    </script>
</body>
</html>
