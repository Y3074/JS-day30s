<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //回调函数 简化串行逻辑
        const dosom = x =>{
            setTimeout(() =>{
                const skill = ['123','456']
                x('it did not go well',skill)
            },2000)
        }
        const callback = (err,result) =>{
            if(err){
                return console.log(err)
            }
            return console.log(result)
        }
        dosom(callback)
        //承诺构造器 
        // const promise = new Promise((resolve,reject)=>{
        //     resolve('sucess')
        //     reject('failure')
        // })
        const dopro = new Promise((resolve,reject)=>{
            setTimeout(()=>{
                const skills = ['1','2','3']
                if(skills.length > 5){
                    resolve(skills)
                }else{
                    reject('something wrong')
                }
            },2000)
        })

        dopro
        .then(result=>{
            console.log(result)
        })
        .catch(error => console.log(error))

        //fetch API
        const url = 'https://restcountries.com/v2/all'
        fetch(url)
        .then(response => response.json())
        .then(data => {
            console.log(data)
        })
        .catch(error => console.log(error))

        //异步和等待
        const fetchDate = async() =>{
            try{
                const response = await fetch(url)
                const data = await response.json()
                console.log(data)
            }catch(err){
                console.log(err)
            }
        }
    </script>
</body>
</html>
