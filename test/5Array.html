<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <script>
        const arr = Array()
        console.log(arr)

        const arr1 = []
        console.log(arr1)

        const arr2 = [1, 2, 3]
        console.log(arr2.length)
        const arr3 = [
            'YinMengQi',
            170,
            150
        ]
        console.log(arr3)
        let js = 'hello this is js'
        const arr4 = js.split(' ')
        console.log(arr4)
        console.log(arr4[0],arr4[2])

        const num1 = [1, 2, 3, 4]
        num1[2] = 6
        console.log(num1)

        const empty = Array(8).fill(0)
        console.log(empty)
        console.log(empty.concat(num1))
        const num2 = [1, 2, 3, 6]
        console.log(num2.length)
        console.log(num2.indexOf(3))
        num2.length == 4?console.log('yes'):console.log('no')
        console.log(num2.lastIndexOf(4))
        console.log(num2.includes(2))
        console.log(Array.isArray(num2))
        console.log(num2.toString())
        console.log(num2.slice(1,3))
        num2.push(9)
        console.log(num2)
        num2.pop()
        console.log(num2)
        num2.shift()
        console.log(num2)
        num2.unshift(6)
        console.log(num2)
        num2.reverse()
        console.log(num2)
        num2.sort()
        console.log(num2)

        
        const itCompanies = ['Facebook', 'Google', 'Microsoft', 'Apple', 'IBM', 'Oracle', 'Amazon']
        let len = itCompanies.length
        let mid = Math.floor((len - 1)/2)
        console.log(itCompanies.splice(0,1))
        console.log(itCompanies.splice(mid,1))
        console.log(itCompanies.splice(-1, 1))
        console.log(itCompanies.splice(0, len))

    </script>
</body>
</html>
