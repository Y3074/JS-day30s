<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>条件句</title>
</head>
<body>
    <script>
        let num = 3
        if(num > 0) console.log(`${num} is a positive number`)
        let isRaining = true
        if(isRaining) console.log('Remember to take your rain coat.')

        let nums = 3
        if(nums > 0) console.log(`${nums} is a positive number`)
        else console.log(`${nums} is a negative number`)
        
        let a = 0
        if(a > 0)console.log('positive number')
        else if(a == 0)console.log('negative number')
        else console.log('not a number')
        
        let weather = 4
        switch(weather){
            case 1:
                console.log(1)
                break
            case 2:
                console.log(2)
                break
            case 3:
                console.log(3)
                break
            default:
                console.log(0)
        }

        let isRain = true
        isRain
            ?console.log('You need a rain coat')
            :console.log('No need for a rain coat')

    </script>
</body>
</html>
