        //class 
        //类的定义
        class person{
            constructor(first = 'e',last = 'f', score,country,skill,age = 18){
                this.first = first
                this.last = last
                this.score = 0
                this.country = country
                this.skill = []
                this.age = age
            }
            getfullname(){
                return this.first + this.last
            }
            get getScore(){
                return this.score
            }
            set setScore(s){
                this.score += s
            }
            getpersoninfo(){

                const index = Math.floor(Math.random() * skills.length)
                return skills[index]
            }
            static showtime(){
                let now = new Date()
                let year = now.getFullYear()
                let mon = now.getMonth()
                let date = now.getDate()
                let hours = now.getHours()
                let min = now.getMinutes()
                let second = now.getSeconds()
                if(hours < 10){
                    hours = '0' + hours
                }
                if(min < 10){
                    min = '0' + min
                }
                let dmy = date + '.' + mon + '.' + year
                let time = hours + ':' + min + ':' + second
                let fulltime = dmy + ' ' + time
                return fulltime
