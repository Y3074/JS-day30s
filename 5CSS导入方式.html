<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <link rel="stylesheet" href="css/h3.css">
    <style>
        p {
            color: red;
            font-size: 20px;
        }
        h2 {
            color:yellow

        }
    </style>
</head>
<body>
    <p>这是使用了CSS的P标签</p>
    <h1 style="color:blue">一级标签 内联样式</h1>
    <h2>二级标签 内部样式</h2>
    <h3>三级标签 外部样式</h3>
</body>
</html>
