<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单</title>
</head>
<body>
    <form action="">
        <label for="account">账号:</label>
        <input type="text" id="account" placeholder="请输入账号">
        <br>
        <label for="password">密码:</label>
        <input type="text" id="password" placeholder="请输入密码">
        <br>
        <span>性别:</span>
        <input type="radio" name="gender" id="">男
        <input type="radio" name="gender" id="">女
        <input type="radio" name="gender" id="">其他
        <br>
        <span>爱好:</span>
        <input type="checkbox" name="hobby" id="">唱歌
        <input type="checkbox" name="hobby" id="">跳舞
        <input type="checkbox" name="hobby" id="">RAP
        <br>
        <input type="submit" value="上传">
    </form>
</body>
</html>
