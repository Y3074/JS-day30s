<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签属性</title>
</head>
<body>
    <a href="">这是一个超链接</a><br>
    <a href="https://www.baidu.com">这是第二个超链接</a><br>
    <a href="https://www.baidu.com" target="_blank">第三个超链接</a><br>
    <a href="https://www.baidu.com" target="_parent">第四个超链接</a><br>
    <a href="https://www.baidu.com" target="_top">第五个超链接</a><br>
    <a href="https://www.baidu.com" target="_self">第六个超链接</a><br>
    <hr>
    <img src="logo.png" alt="">
    <hr>
    <img src="log.png" alt="无法显示">
    <hr>
    <img src="logo.png" alt="" width="200" height="100">

</body>
</html>
