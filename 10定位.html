<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位</title>
    <style>
        .box1 {
            height:350px;
            background-color:blue;
        }
        .box2 {
            height:350px;
            background-color:green;
        }
        .box3 {
            height:350px;
            background-color:antiquewhite;
        }
        .relative {
            width: 100px;
            height: 100px;
            background-color: aqua;
            position:relative;
            left:50px;
            top:30px;
        }
        .absolute
        {
            width: 100px;
            height: 100px;
            background-color:yellowgreen;
            position:absolute;
            left: 50px;
            bottom:50px;
        }
        .guding {
            width: 100px;
            height: 100px;
            background-color: aquamarine;
            position:fixed;
            right:0;
            top:100px;
        }
        .demo {
            height: 100px;
            width: 100px;
            background-color: red;
            left:100px;
            top:40px;
        }
    </style>
</head>
<body>
    <h1>相对定位</h1>
    <div class="box1">
        <div class="demo"></div>
        <div class="relative"></div>
        <div class="demo"></div>
    </div>
    <hr>
    <h1>绝对定位</h1>
    <div class="box2">
        <div class="demo"></div>
        <div class="absolute"></div>
        <div class="demo"></div>
    </div>
    <hr>
    <h1>固定定位</h1>
    <div class="box3">
        <div class="demo"></div>
        <div class="guding"></div>
        <div class="demo"></div>
    </div>
</body>
</html>
