<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        th,td{
            
            border:1px solid gray; 
            text-align: center;
            padding:5px;
        }

            background-color:gray;
        }
        table{
            width: 100%;
            margin-top: 10px;

        }

</head>

    <button onclick="adddata()">新增数据</button>
    <table id = 'table'>
        <tr>
            <th>姓名</th>
            <th>联系方式</th>
            <th>操作方式</th>
        </tr>
        <tr>
            <td>尹蒙旗</td>
            <td>15542081142</td>
            <td><button onclick="editdata(this)">编辑</button><button onclick="deletedata(this)">删除</button></td>
        </tr>
    </table>
    <script src="/js/table.js"></script>
</body>
</html>
